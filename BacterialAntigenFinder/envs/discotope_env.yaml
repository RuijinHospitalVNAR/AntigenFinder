# DiscoTope-3.0 环境配置
# 使用CUDA 12.1兼容的PyTorch
name: discotope_env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - numpy>=1.24
  - pandas>=1.4
  - biopython>=1.80
  - biotite>=0.40
  - scikit-learn>=1.0
  - joblib>=1.5
  - pip:
    - torch-geometric>=2.4
    - xgboost>=2.0
    - pygam>=0.9.0
