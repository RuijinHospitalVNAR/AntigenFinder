# EpiGraph 环境配置
# Python 3.8.12, PyTorch 1.10.1, PyTorch Geometric 2.0.4
name: epigraph_env
channels:
  - pytorch
  - pyg
  - conda-forge
  - defaults
dependencies:
  - python=3.8.12
  - pip
  - pytorch=1.10.1
  - cudatoolkit=11.3
  - pyg=2.0.4
  - pytorch-cluster=1.6.0
  - pytorch-scatter=2.0.9
  - pytorch-sparse=0.6.13
  - pytorch-spline-conv=1.2.1
  - pip:
    - fair-esm==1.0.2
    - biopython==1.83
    - biotite==0.40.0
    - graphein==1.4.0
    - biopandas==0.2.9
    - numpy==1.22.4
    - pandas==1.3.4
    - scipy==1.7.1
    - scikit-learn==1.0.1
    - networkx==2.7.1
    - wget==3.2
    - tqdm>=4.64.0
    - transformers==4.15.0
