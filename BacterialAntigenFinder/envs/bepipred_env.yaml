# BepiPred-3.0 环境配置
# Python 3.8.8, PyTorch 1.12.0, ESM-2
name: bepipred_env
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.8.8
  - pip
  - pytorch=1.12.0
  - cudatoolkit=11.3
  - pip:
    - bp3==0.0.12.7
    - fair-esm==1.0.3
    - numpy==1.20.2
    - pandas==1.4.3
    - plotly==5.8.0
    - importlib-resources==5.8.0
    - biopython>=1.79
