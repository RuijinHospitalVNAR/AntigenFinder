# BacterialAntigenFinder Docker Compose配置
#
# 使用方式:
#   1. 构建镜像:   docker compose build
#   2. 运行测试:   docker compose run --rm antigen-finder-test
#   3. 自定义运行: docker compose run --rm antigen-finder \
#                    --fasta /app/data/pseudomonas_aeruginosa_antigens.fasta \
#                    --pdb_dir /app/data/structures/ \
#                    --species Pseudomonas_aeruginosa \
#                    --output_dir /app/results/
#
# GPU支持:
#   Windows Docker Desktop: 在Docker Desktop设置中启用WSL2 GPU支持
#   Linux: 使用 deploy.resources.devices 或 nvidia-container-toolkit

version: '3.8'

services:
  # 主服务 - 抗原筛选Pipeline
  antigen-finder:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: bacterial-antigen-finder:latest
    container_name: bacterial-antigen-finder

    # GPU支持 (Linux nvidia-container-toolkit)
    # Windows Docker Desktop 通过 WSL2 自动处理 GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          cpus: '4'
          memory: 16G

    # 环境变量
    environment:
      - PYTHONUNBUFFERED=1
      - SPECIES=${SPECIES:-}
      - ORGANISM_TYPE=${ORGANISM_TYPE:-gram-}

    # 卷挂载 - 路径相对于docker-compose.yaml所在目录
    volumes:
      # 输入数据（自定义数据放这里）
      - ../data:/app/data:ro
      # 输出结果
      - ../results:/app/results
      # 示例数据
      - ../example_data:/app/example_data:ro
      # 模型文件（只读）- 路径可通过 MODEL_BASE_DIR 环境变量覆盖
      - ${MODEL_BASE_DIR:-../models}/BepiPred-3.0-main:/app/models/BepiPred-3.0-main:ro
      - ${MODEL_BASE_DIR:-../models}/DiscoTope-3.0-master:/app/models/DiscoTope-3.0-master:ro
      - ${MODEL_BASE_DIR:-../models}/GraphBepi-main:/app/models/GraphBepi-main:ro
      - ${MODEL_BASE_DIR:-../models}/EpiGraph-main:/app/models/EpiGraph-main:ro

    # 网络
    networks:
      - antigen-network

    # 重启策略
    restart: "no"

    # 工作目录
    working_dir: /app

    # 默认命令：使用 docker-compose 示例数据运行分析
    # 用户可通过环境变量覆盖: SPECIES=Klebsiella_pneumoniae docker compose up antigen-finder
    # 或直接用 docker compose run 传参覆盖
    command: >
      --fasta /app/example_data/${EXAMPLE_FASTA:-sample_antigens.fasta}
      --pdb_dir /app/data/
      --organism_type ${ORGANISM_TYPE:-gram-}
      --species ${SPECIES:-}
      --output_dir /app/results/
      --output_format both
      --log_level INFO

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 测试服务 - 使用示例数据运行Pipeline验证
  antigen-finder-test:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: bacterial-antigen-finder:latest
    container_name: bacterial-antigen-finder-test

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          cpus: '2'
          memory: 8G

    environment:
      - PYTHONUNBUFFERED=1
      - SPECIES=Pseudomonas_aeruginosa
      - ORGANISM_TYPE=gram-

    volumes:
      - ../example_data:/app/data:ro
      - ../results/test_run:/app/results
      - ${MODEL_BASE_DIR:-../models}/BepiPred-3.0-main:/app/models/BepiPred-3.0-main:ro
      - ${MODEL_BASE_DIR:-../models}/DiscoTope-3.0-master:/app/models/DiscoTope-3.0-master:ro
      - ${MODEL_BASE_DIR:-../models}/GraphBepi-main:/app/models/GraphBepi-main:ro
      - ${MODEL_BASE_DIR:-../models}/EpiGraph-main:/app/models/EpiGraph-main:ro

    networks:
      - antigen-network

    restart: "no"

    working_dir: /app

    # 使用示例数据运行测试
    command: >
      --fasta /app/data/pseudomonas_aeruginosa_antigens.fasta
      --pdb_dir /app/data/structures/
      --organism_type gram-
      --species Pseudomonas_aeruginosa
      --output_dir /app/results/
      --models bepipred,discotope,graphbepi,epigraph
      --output_format both

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    profiles:
      - test

# 网络配置
networks:
  antigen-network:
    driver: bridge
