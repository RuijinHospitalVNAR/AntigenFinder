# BacterialAntigenFinder Docker Compose配置
#
# 使用方式:
#   1. 构建镜像:   docker compose -f docker/docker-compose.yaml build
#   2. 运行测试:   docker compose -f docker/docker-compose.yaml run --rm antigen-finder-test
#   3. 自定义运行: docker compose -f docker/docker-compose.yaml run --rm antigen-finder \
#                    --fasta /app/data/pseudomonas_aeruginosa_antigens.fasta \
#                    --pdb_dir /app/data/structures/ \
#                    --species Pseudomonas_aeruginosa \
#                    --output_dir /app/results/
#
# GPU支持:
#   Linux: 需要 nvidia-container-toolkit

services:
  # 主服务 - 抗原筛选Pipeline
  antigen-finder:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: bacterial-antigen-finder:latest
    container_name: bacterial-antigen-finder

    # GPU支持 (需要 nvidia-container-toolkit)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          cpus: '4'
          memory: 16G

    # 环境变量
    environment:
      - PYTHONUNBUFFERED=1
      - SPECIES=${SPECIES:-}
      - ORGANISM_TYPE=${ORGANISM_TYPE:-gram-}

    # 卷挂载
    volumes:
      # 输入数据（自定义数据放这里）
      - ../data:/app/data:ro
      # 输出结果
      - ../results:/app/results
      # 示例数据
      - ../example_data:/app/example_data:ro
      # 模型文件
      # 注意: BepiPred 需要可写（缓存ESM编码），不加 :ro
      - ${MODEL_BASE_DIR:-..}/BepiPred-3.0-main:/app/models/BepiPred-3.0-main
      - ${MODEL_BASE_DIR:-..}/DiscoTope-3.0-master:/app/models/DiscoTope-3.0-master:ro
      - ${MODEL_BASE_DIR:-..}/GraphBepi-main:/app/models/GraphBepi-main:ro
      - ${MODEL_BASE_DIR:-..}/EpiGraph-main:/app/models/EpiGraph-main:ro
      # ESM预下载模型缓存（建议提前下载，避免运行时联网）
      - ${ESM_CACHE_DIR:-../esm_cache}:/root/.cache/torch/hub/checkpoints

    # 网络
    networks:
      - antigen-network

    # 重启策略
    restart: "no"

    # 工作目录
    working_dir: /app

    # 默认命令
    command: >
      --fasta /app/example_data/${EXAMPLE_FASTA:-sample_antigens.fasta}
      --pdb_dir /app/data/structures/
      --organism_type ${ORGANISM_TYPE:-gram-}
      --species ${SPECIES:-}
      --output_dir /app/results/
      --output_format both
      --log_level INFO

    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 测试服务 - 使用示例数据运行Pipeline验证
  antigen-finder-test:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: bacterial-antigen-finder:latest
    container_name: bacterial-antigen-finder-test

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          cpus: '2'
          memory: 16G

    environment:
      - PYTHONUNBUFFERED=1
      - SPECIES=Pseudomonas_aeruginosa
      - ORGANISM_TYPE=gram-

    volumes:
      - ../example_data:/app/data:ro
      - ../results/test_run:/app/results
      # 注意: BepiPred 需要可写
      - ${MODEL_BASE_DIR:-..}/BepiPred-3.0-main:/app/models/BepiPred-3.0-main
      - ${MODEL_BASE_DIR:-..}/DiscoTope-3.0-master:/app/models/DiscoTope-3.0-master:ro
      - ${MODEL_BASE_DIR:-..}/GraphBepi-main:/app/models/GraphBepi-main:ro
      - ${MODEL_BASE_DIR:-..}/EpiGraph-main:/app/models/EpiGraph-main:ro
      # ESM预下载模型缓存
      - ${ESM_CACHE_DIR:-../esm_cache}:/root/.cache/torch/hub/checkpoints

    networks:
      - antigen-network

    restart: "no"

    working_dir: /app

    command: >
      --fasta /app/data/pseudomonas_aeruginosa_antigens.fasta
      --pdb_dir /app/data/structures/
      --organism_type gram-
      --species Pseudomonas_aeruginosa
      --output_dir /app/results/
      --models bepipred,discotope,graphbepi,epigraph
      --output_format both

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    profiles:
      - test

# 网络配置
networks:
  antigen-network:
    driver: bridge
